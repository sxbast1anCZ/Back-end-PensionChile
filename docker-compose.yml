version: '3.8'

services:
  postgres:
    image: postgres:17
    container_name: postgres-pensionchile
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: pensionchile_db
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5433:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d pensionchile_db"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data: